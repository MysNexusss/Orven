<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StakeMaster • Gerenciador de Apostas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .card-hover:hover { transform: translateY(-4px); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

  <div class="flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <div id="sidebar" class="w-64 bg-zinc-900 border-r border-zinc-800 overflow-auto">
      <!-- Carregado via JS -->
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-auto">
      <div class="p-6 md:p-8">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
          <div>
            <h1 class="text-3xl font-bold">Dashboard</h1>
            <p class="text-zinc-400">Bem-vindo de volta • Julho 2026</p>
          </div>
          <button onclick="novaAposta()" 
                  class="bg-green-600 hover:bg-green-500 px-5 py-2.5 rounded-xl font-medium flex items-center gap-2">
            <i class="fas fa-plus"></i>
            Nova Aposta
          </button>
        </div>

        <!-- Content Area -->
        <div id="main-content">
          <!-- Dashboard será carregado aqui -->
        </div>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script src="js/main.js"></script>
</body>
</html>
